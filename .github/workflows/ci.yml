name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,json,css}"

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc -b

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build:web
