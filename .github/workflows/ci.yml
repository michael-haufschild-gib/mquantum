name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,json,css}"

      - name: Lint
        run: npx eslint . --max-warnings 0 --no-warn-ignored

      - name: Lint CSS
        run: npx stylelint "src/**/*.css" --max-warnings 0

      - name: Type check
        run: npx tsc -b

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Coverage ratchet
        run: node scripts/check-coverage-ratchet.js

      # build:web skips wasm:build — the separate `wasm` job handles that.
      # WASM has JS fallbacks, so the main build doesn't need it.
      - name: Build
        run: npm run build:web

      - name: Bundle size budget
        run: node scripts/check-bundle-size.js

  # Separate optional job — verifies Rust/WASM compilation without blocking PRs.
  # The main `ci` job does NOT depend on this; WASM has JS fallbacks.
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/wasm/mdimension_core

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        run: wasm-pack build ./src/wasm/mdimension_core --target web

      - name: Clippy
        run: cargo clippy --manifest-path src/wasm/mdimension_core/Cargo.toml --target wasm32-unknown-unknown -- -D warnings
