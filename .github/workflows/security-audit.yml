name: Security Audit

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from `packageManager` field in package.json —
      # specifying it here too triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Only audit production dependencies — dev-dependency advisories
      # (e.g. in test tooling) are noise for a client-side SPA.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
