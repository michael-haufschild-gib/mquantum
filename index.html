<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; worker-src 'self' blob:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">

    <!-- SEO Meta -->
    <title>MQuantum - N-Dimensional Quantum Physics Visualizer</title>
    <meta name="description" content="Visualize quantum wavefunctions in 2 to 11 dimensions. Harmonic oscillators, hydrogen orbitals, TDSE dynamics, and more — rendered in real-time via WebGPU." />
    <meta name="theme-color" content="#0d0d0f" />
    <meta name="author" content="MQuantum" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mquantum.vercel.app/" />
    <meta property="og:title" content="MQuantum - N-Dimensional Quantum Physics Visualizer" />
    <meta property="og:description" content="Visualize quantum wavefunctions in 2 to 11 dimensions. Harmonic oscillators, hydrogen orbitals, TDSE dynamics, and more — rendered in real-time via WebGPU." />
    <meta property="og:image" content="https://mquantum.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="MQuantum" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MQuantum - N-Dimensional Quantum Physics Visualizer" />
    <meta name="twitter:description" content="Visualize quantum wavefunctions in 2 to 11 dimensions via WebGPU" />
    <meta name="twitter:image" content="https://mquantum.vercel.app/twitter-card.jpg" />

    <!-- Self-hosted fonts (preload critical weights for faster initial render) -->
    <link rel="preload" href="/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/JetBrainsMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body class="bg-dark-bg text-dark-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
